services:
  db:
    image: postgres:14
    container_name: ddtextil-db
    environment:
      POSTGRES_DB: tienda_digital_textiles_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Mp.1025889078
    volumes:
      - "./BASE DE DATOS/TIENDA DIGITAL TEXTIL.sql:/docker-entrypoint-initdb.d/01-init.sql"
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tienda_digital_textiles_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./tienda digital de telas/backend-java/conexionPostgres
      dockerfile: Dockerfile
    container_name: ddtextil-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/tienda_digital_textiles_db
      DB_USER: postgres
      DB_PASSWORD: Mp.1025889078
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./tienda digital de telas
      dockerfile: Dockerfile
    container_name: ddtextil-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
